<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Kimi K3 workload decision matrix</title>
  <desc id="desc">A qualitative matrix comparing Kimi K3 with leading closed and open models across real workflow criteria.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#111827}
      .sub{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d6976}
      .head{font:800 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#1f2937}
      .cell{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#24303b}
      .note{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#66737f}
    </style>
  </defs>
  <rect width="1280" height="860" fill="#f6f8fb"/>
  <rect x="58" y="54" width="1164" height="744" rx="26" fill="#fff" filter="url(#shadow)"/>
  <text x="90" y="105" class="title">Which model is actually useful for the job?</text>
  <text x="90" y="134" class="sub">A workflow matrix is more honest than a single leaderboard number.</text>

  <g transform="translate(90 178)">
    <rect width="1100" height="560" rx="16" fill="#fbfcfd" stroke="#dbe3ea"/>
    <g>
      <rect x="0" y="0" width="220" height="70" fill="#eff4f8"/>
      <rect x="220" y="0" width="176" height="70" fill="#eff4f8"/>
      <rect x="396" y="0" width="176" height="70" fill="#eff4f8"/>
      <rect x="572" y="0" width="176" height="70" fill="#eff4f8"/>
      <rect x="748" y="0" width="176" height="70" fill="#eff4f8"/>
      <rect x="924" y="0" width="176" height="70" fill="#eff4f8"/>
      <text x="20" y="42" class="head">Workload</text>
      <text x="308" y="32" text-anchor="middle" class="head">Kimi K3</text>
      <text x="308" y="51" text-anchor="middle" class="note">workspace depth</text>
      <text x="484" y="32" text-anchor="middle" class="head">Claude</text>
      <text x="484" y="51" text-anchor="middle" class="note">judgment polish</text>
      <text x="660" y="32" text-anchor="middle" class="head">GPT</text>
      <text x="660" y="51" text-anchor="middle" class="note">ecosystem breadth</text>
      <text x="836" y="32" text-anchor="middle" class="head">Gemini</text>
      <text x="836" y="51" text-anchor="middle" class="note">Google multimodal</text>
      <text x="1012" y="32" text-anchor="middle" class="head">Open peers</text>
      <text x="1012" y="51" text-anchor="middle" class="note">cost / control</text>
    </g>

    <g transform="translate(0 70)">
      <g>
        <rect x="0" y="0" width="220" height="70" fill="#fff"/>
        <text x="20" y="31" class="head">Repo-scale coding</text>
        <text x="20" y="52" class="note">long sessions, screenshots, tools</text>
        <rect x="220" y="0" width="176" height="70" fill="#dff4ee"/><text x="308" y="43" text-anchor="middle" class="cell">very strong</text>
        <rect x="396" y="0" width="176" height="70" fill="#e9edff"/><text x="484" y="43" text-anchor="middle" class="cell">excellent</text>
        <rect x="572" y="0" width="176" height="70" fill="#eef2f7"/><text x="660" y="43" text-anchor="middle" class="cell">excellent</text>
        <rect x="748" y="0" width="176" height="70" fill="#fff6d9"/><text x="836" y="43" text-anchor="middle" class="cell">good</text>
        <rect x="924" y="0" width="176" height="70" fill="#e9f7ff"/><text x="1012" y="43" text-anchor="middle" class="cell">varies</text>
      </g>
      <g transform="translate(0 70)">
        <rect x="0" y="0" width="220" height="70" fill="#fff"/>
        <text x="20" y="31" class="head">Long document work</text>
        <text x="20" y="52" class="note">1M context, office output</text>
        <rect x="220" y="0" width="176" height="70" fill="#dff4ee"/><text x="308" y="43" text-anchor="middle" class="cell">core strength</text>
        <rect x="396" y="0" width="176" height="70" fill="#eef2ff"/><text x="484" y="43" text-anchor="middle" class="cell">strong</text>
        <rect x="572" y="0" width="176" height="70" fill="#eef2f7"/><text x="660" y="43" text-anchor="middle" class="cell">strong</text>
        <rect x="748" y="0" width="176" height="70" fill="#fff3c5"/><text x="836" y="43" text-anchor="middle" class="cell">strong</text>
        <rect x="924" y="0" width="176" height="70" fill="#f0fbff"/><text x="1012" y="43" text-anchor="middle" class="cell">depends</text>
      </g>
      <g transform="translate(0 140)">
        <rect x="0" y="0" width="220" height="70" fill="#fff"/>
        <text x="20" y="31" class="head">Reasoning efficiency</text>
        <text x="20" y="52" class="note">quality per token and minute</text>
        <rect x="220" y="0" width="176" height="70" fill="#fff1e6"/><text x="308" y="43" text-anchor="middle" class="cell">watch closely</text>
        <rect x="396" y="0" width="176" height="70" fill="#dfe7ff"/><text x="484" y="43" text-anchor="middle" class="cell">usually high</text>
        <rect x="572" y="0" width="176" height="70" fill="#e5ecf3"/><text x="660" y="43" text-anchor="middle" class="cell">usually high</text>
        <rect x="748" y="0" width="176" height="70" fill="#fff6d9"/><text x="836" y="43" text-anchor="middle" class="cell">mixed</text>
        <rect x="924" y="0" width="176" height="70" fill="#dff4ee"/><text x="1012" y="43" text-anchor="middle" class="cell">cost edge</text>
      </g>
      <g transform="translate(0 210)">
        <rect x="0" y="0" width="220" height="70" fill="#fff"/>
        <text x="20" y="31" class="head">Self-hosting path</text>
        <text x="20" y="52" class="note">weights, hardware, ops burden</text>
        <rect x="220" y="0" width="176" height="70" fill="#fff1e6"/><text x="308" y="43" text-anchor="middle" class="cell">pending / heavy</text>
        <rect x="396" y="0" width="176" height="70" fill="#f7f8fa"/><text x="484" y="43" text-anchor="middle" class="cell">no</text>
        <rect x="572" y="0" width="176" height="70" fill="#f7f8fa"/><text x="660" y="43" text-anchor="middle" class="cell">no</text>
        <rect x="748" y="0" width="176" height="70" fill="#f7f8fa"/><text x="836" y="43" text-anchor="middle" class="cell">limited</text>
        <rect x="924" y="0" width="176" height="70" fill="#dff4ee"/><text x="1012" y="43" text-anchor="middle" class="cell">best today</text>
      </g>
      <g transform="translate(0 280)">
        <rect x="0" y="0" width="220" height="70" fill="#fff"/>
        <text x="20" y="31" class="head">Enterprise polish</text>
        <text x="20" y="52" class="note">guardrails, consistency, support</text>
        <rect x="220" y="0" width="176" height="70" fill="#eef8f4"/><text x="308" y="43" text-anchor="middle" class="cell">improving</text>
        <rect x="396" y="0" width="176" height="70" fill="#dfe7ff"/><text x="484" y="43" text-anchor="middle" class="cell">excellent</text>
        <rect x="572" y="0" width="176" height="70" fill="#e5ecf3"/><text x="660" y="43" text-anchor="middle" class="cell">excellent</text>
        <rect x="748" y="0" width="176" height="70" fill="#fff3c5"/><text x="836" y="43" text-anchor="middle" class="cell">strong</text>
        <rect x="924" y="0" width="176" height="70" fill="#f0fbff"/><text x="1012" y="43" text-anchor="middle" class="cell">varies</text>
      </g>
      <g transform="translate(0 350)">
        <rect x="0" y="0" width="220" height="70" fill="#fff"/>
        <text x="20" y="31" class="head">Verification maturity</text>
        <text x="20" y="52" class="note">independent tests, model cards</text>
        <rect x="220" y="0" width="176" height="70" fill="#fff1e6"/><text x="308" y="43" text-anchor="middle" class="cell">early</text>
        <rect x="396" y="0" width="176" height="70" fill="#e9edff"/><text x="484" y="43" text-anchor="middle" class="cell">mature</text>
        <rect x="572" y="0" width="176" height="70" fill="#e5ecf3"/><text x="660" y="43" text-anchor="middle" class="cell">mature</text>
        <rect x="748" y="0" width="176" height="70" fill="#fff6d9"/><text x="836" y="43" text-anchor="middle" class="cell">mature</text>
        <rect x="924" y="0" width="176" height="70" fill="#e9f7ff"/><text x="1012" y="43" text-anchor="middle" class="cell">mixed</text>
      </g>
    </g>
    <path d="M220 0v560M396 0v560M572 0v560M748 0v560M924 0v560M0 70h1100M0 140h1100M0 210h1100M0 280h1100M0 350h1100M0 420h1100" stroke="#dbe3ea"/>
  </g>
  <text x="90" y="776" class="note">This matrix is a decision aid, not a ranking. A team should rerun it with its own test cases, token logs, failures, and latency records.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">Kimi K3 frontier model landscape</title>
  <desc id="desc">A qualitative model landscape comparing Kimi K3 with Claude, GPT, Gemini, DeepSeek, Qwen and GLM across openness and long-horizon workflow depth.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f9fb"/>
      <stop offset="100%" stop-color="#eef5f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <style>
      .axis{stroke:#26323f;stroke-width:2.2}
      .grid{stroke:#cfd8df;stroke-width:1}
      .label{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#16202a}
      .small{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#52606d}
      .tiny{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#66737f}
      .bubbleText{font:800 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .bubbleSub{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#415160}
    </style>
  </defs>
  <rect width="1280" height="780" fill="url(#bg)"/>
  <rect x="74" y="70" width="1132" height="610" rx="28" fill="#fff" filter="url(#shadow)"/>
  <text x="102" y="118" class="label">Frontier model map: Kimi K3 is a workspace bet, not just a benchmark entry</text>
  <text x="102" y="148" class="small">Qualitative reading based on official Kimi/Moonshot material and launch-week public evaluations.</text>

  <line x1="160" y1="590" x2="1088" y2="590" class="axis"/>
  <line x1="160" y1="590" x2="160" y2="208" class="axis"/>
  <polygon points="1088,590 1068,580 1068,600" fill="#26323f"/>
  <polygon points="160,208 150,228 170,228" fill="#26323f"/>
  <line x1="160" y1="462" x2="1088" y2="462" class="grid"/>
  <line x1="160" y1="334" x2="1088" y2="334" class="grid"/>
  <line x1="392" y1="208" x2="392" y2="590" class="grid"/>
  <line x1="624" y1="208" x2="624" y2="590" class="grid"/>
  <line x1="856" y1="208" x2="856" y2="590" class="grid"/>

  <text x="420" y="637" text-anchor="middle" class="small">closed product surface</text>
  <text x="835" y="637" text-anchor="middle" class="small">open-weight / deployable direction</text>
  <text transform="translate(112,505) rotate(-90)" class="small">short-task assistant</text>
  <text transform="translate(112,317) rotate(-90)" class="small">long-horizon workspace</text>

  <g transform="translate(724 246)">
    <rect x="-122" y="-44" width="244" height="88" rx="22" fill="#dff4ee" stroke="#21a67a" stroke-width="2"/>
    <text y="-8" text-anchor="middle" class="bubbleText">Kimi K3</text>
    <text y="16" text-anchor="middle" class="bubbleSub">1M context + coding + native vision</text>
    <text y="35" text-anchor="middle" class="bubbleSub">open 3T-class direction</text>
  </g>

  <g transform="translate(456 272)">
    <rect x="-112" y="-38" width="224" height="76" rx="20" fill="#eef2ff" stroke="#6977d9" stroke-width="2"/>
    <text y="-4" text-anchor="middle" class="bubbleText">Claude Fable 5</text>
    <text y="20" text-anchor="middle" class="bubbleSub">polished reasoning, strong taste</text>
  </g>

  <g transform="translate(472 392)">
    <rect x="-108" y="-38" width="216" height="76" rx="20" fill="#f4f7fb" stroke="#718096" stroke-width="2"/>
    <text y="-4" text-anchor="middle" class="bubbleText">GPT 5.6 Sol</text>
    <text y="20" text-anchor="middle" class="bubbleSub">broad tool ecosystem</text>
  </g>

  <g transform="translate(566 498)">
    <rect x="-98" y="-34" width="196" height="68" rx="18" fill="#fff8db" stroke="#d9a514" stroke-width="2"/>
    <text y="-3" text-anchor="middle" class="bubbleText">Gemini</text>
    <text y="20" text-anchor="middle" class="bubbleSub">Google-native multimodal work</text>
  </g>

  <g transform="translate(922 432)">
    <rect x="-138" y="-44" width="276" height="88" rx="22" fill="#eef9ff" stroke="#3a91c9" stroke-width="2"/>
    <text y="-8" text-anchor="middle" class="bubbleText">DeepSeek / Qwen / GLM</text>
    <text y="16" text-anchor="middle" class="bubbleSub">practical open models, cost pressure</text>
    <text y="35" text-anchor="middle" class="bubbleSub">often easier to operate today</text>
  </g>

  <g transform="translate(916 300)">
    <rect x="-98" y="-34" width="196" height="68" rx="18" fill="#fff1f2" stroke="#e05665" stroke-width="2"/>
    <text y="-3" text-anchor="middle" class="bubbleText">Inkling-class peers</text>
    <text y="20" text-anchor="middle" class="bubbleSub">open frontier pressure</text>
  </g>

  <text x="170" y="702" class="tiny">Reading note: positions are interpretive, not benchmark scores. Kimi K3's technical report and full weights still require post-release verification.</text>
</svg>
